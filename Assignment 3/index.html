<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Student Registry DApp</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <h1>Student Registry</h1>
        <p>Connect MetaMask and register your name on-chain.</p>
      </header>

      <section class="card">
        <button id="connectBtn">Connect MetaMask</button>
        <p id="account">Not connected</p>
      </section>

      <section class="card">
        <h2>Register</h2>
        <label>
          Name
          <input id="name" type="text" placeholder="Pruthviraj" />
        </label>
        <label>
          Roll Number
          <input id="roll" type="text" placeholder="123B1B056" />
        </label>
        <button id="registerBtn">Register</button>
      </section>

      <section class="card">
        <h2>My Record</h2>
        <button id="fetchBtn">Fetch</button>
        <pre id="record">No data</pre>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
